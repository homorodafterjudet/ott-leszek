<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ABSZOLVALO AFTER</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#00c2c7;
  color:white;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
  text-align:center;
}

h1{
  font-size:32px;
}

h2{
  color:red;
}

/* ✔ CHECKBOX FIX */
label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:22px;
  margin:20px 0;
  cursor:pointer;
}

input[type="checkbox"]{
  transform: scale(1.5);
}

/* input + gomb */
input[type="text"]{
  width:100%;
  padding:12px;
  font-size:18px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:18px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

/* lista */
.list{
  text-align:left;
  margin-top:20px;
}

.item{
  padding:5px 0;
  font-size:18px;
}

/* info alul */
.info{
  margin-top:25px;
  padding:15px;
  background:rgba(0,0,0,0.2);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>ABSZOLVALO AFTER</h1>
<h2>OTT LESZEK</h2>

<!-- ✔ CHECKBOX (EZ MOST MÁR LÁTSZIK!) -->
<label>
  <input type="checkbox" id="check">
  <span>OTT LESZEK</span>
</label>

<!-- NÉV BEÍRÁS -->
<div id="form" style="display:none;">
  <input type="text" id="name" placeholder="Írd be a neved">
  <button onclick="send()">Küldés</button>
</div>

<h3>Résztvevők:</h3>
<div id="list"></div>

<h3>Összesen: <span id="count">0</span> fő</h3>

<!-- INFO -->
<div class="info">
  <p><b>Dátum:</b> 2026 07 8–9 (szerda–csütörtök)</p>
  <p><b>Helyszín:</b> CASA SOFIA HOMOROD</p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (A TIÉD) */
const firebaseConfig = {
  apiKey: "AIzaSyCYb6Lvht3pv0pThXjg8oiUXrL7HX03tcM",
  authDomain: "abszolvalo-after.firebaseapp.com",
  projectId: "abszolvalo-after",
  storageBucket: "abszolvalo-after.firebasestorage.app",
  messagingSenderId: "947590019241",
  appId: "1:947590019241:web:f55c24e514ab5d2e8791b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const check = document.getElementById("check");
const form = document.getElementById("form");

/* checkbox működés */
check.addEventListener("change", () => {
  if (check.checked) {
    form.style.display = "block";
  } else {
    form.style.display = "none";
  }
});

/* küldés Firebase-be */
window.send = async function() {
  const name = document.getElementById("name").value;

  if (!name) return alert("Írd be a neved!");

  await addDoc(collection(db, "people"), {
    name: name
  });

  document.getElementById("name").value = "";
};

/* lista */
const list = document.getElementById("list");
const count = document.getElementById("count");

onSnapshot(collection(db, "people"), (snapshot) => {
  list.innerHTML = "";
  let i = 0;

  snapshot.forEach(doc => {
    i++;
    const data = doc.data();

    list.innerHTML += `
      <div class="item">${i}. ${data.name}</div>
    `;
  });

  count.innerText = i;
});

</script>

</body>
</html>
