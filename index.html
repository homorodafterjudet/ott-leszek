<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ABSZOLVALO AFTER</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#00c6ff,#0072ff,#00ffd5);
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

button {
  background: black;
  color: white;
  border: none;
}

.red { color: red; }
.white { color: white; }
</style>
</head>

<body>

<div class="container">

<h1>ABSZOLVALO AFTER</h1>
<h2>OTT LESZEK</h2>

<label>
<input type="checkbox" id="check"> Jövök
</label>

<div id="form" style="display:none;">
  <input type="text" id="name" placeholder="Név">
  <button onclick="send()">Küldés</button>
</div>

<h3>Résztvevők:</h3>
<div id="list"></div>

<h3>Összesen: <span id="count">0</span></h3>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYb6Lvht3pv0pThXjg8oiUXrL7HX03tcM",
  authDomain: "abszolvalo-after.firebaseapp.com",
  projectId: "abszolvalo-after",
  storageBucket: "abszolvalo-after.firebasestorage.app",
  messagingSenderId: "947590019241",
  appId: "1:947590019241:web:f55c24e514ab5d2e8791b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const check = document.getElementById("check");
const form = document.getElementById("form");

check.addEventListener("change", () => {
  form.style.display = check.checked ? "block" : "none";
});

window.send = async function() {
  const name = document.getElementById("name").value;
  if (!name) return;

  await addDoc(collection(db, "people"), { name });
  document.getElementById("name").value = "";
};

const list = document.getElementById("list");
const count = document.getElementById("count");

onSnapshot(collection(db, "people"), (snap) => {

  list.innerHTML = "";
  let i = 0;

  snap.forEach(doc => {
    i++;
    const data = doc.data();

    list.innerHTML += `<div class="${i%2===0?'red':'white'}">${i}. ${data.name}</div>`;
  });

  count.innerText = i;
});

</script>

</body>
</html>
