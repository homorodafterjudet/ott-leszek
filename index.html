<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ABSZOLVALO AFTER</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #00c2c7;
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 32px;
}

h2 {
  color: red;
}

.list {
  text-align: left;
  margin-top: 20px;
}

.item {
  padding: 5px 0;
  font-size: 18px;
  color: white;
}

.footer {
  margin-top: 30px;
  font-size: 16px;
}

.info {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>ABSZOLVALO AFTER</h1>
<h2>OTT LESZEK</h2>

<h3>Résztvevők:</h3>
<div id="list"></div>

<h3>Összesen: <span id="count">0</span> fő</h3>

<div class="info">
  <p><b>Dátum:</b> 2026. július 8–9. (szerda–csütörtök)</p>
  <p><b>Helyszín:</b> Casa Sofia, Băile Homorod 92B</p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYb6Lvht3pv0pThXjg8oiUXrL7HX03tcM",
  authDomain: "abszolvalo-after.firebaseapp.com",
  projectId: "abszolvalo-after",
  storageBucket: "abszolvalo-after.firebasestorage.app",
  messagingSenderId: "947590019241",
  appId: "1:947590019241:web:f55c24e514ab5d2e8791b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const count = document.getElementById("count");

// ha nincs input még, akkor csak Firebase-ből olvassuk

onSnapshot(collection(db, "people"), (snapshot) => {
  list.innerHTML = "";
  let i = 0;

  snapshot.forEach(doc => {
    i++;
    const data = doc.data();

    list.innerHTML += `
      <div class="item">
        ${i}. ${data.name}
      </div>
    `;
  });

  count.innerText = i;
});

</script>

</body>
</html>
